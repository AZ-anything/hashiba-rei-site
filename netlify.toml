[[redirects]]
  from = "http://reivox.jp/*"
  to = "https://reivox.jp/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.reivox.jp/*"
  to = "https://reivox.jp/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.reivox.jp/*"
  to = "https://reivox.jp/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
