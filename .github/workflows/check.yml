name: 発売チェック・自動更新

on:
  schedule:
    - cron: "10 15 * * *"   # 毎日 0:10 JST（= UTC 15:10）
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 依存ライブラリ
        run: pip install requests beautifulsoup4 lxml

      - name: YouTube動画リスト取得
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch_youtube.py

      - name: 発売チェック実行
        run: python check_releases.py

      - name: 変更があればコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube.json works.json
          git diff --staged --quiet && echo "変更なし" || (
            git commit -m "chore: 発売ステータス・発売時期 自動更新 $(date -u '+%Y-%m-%d')"
            git push
          )
