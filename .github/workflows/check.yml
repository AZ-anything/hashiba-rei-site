name: 発売チェック・自動更新

on:
  schedule:
    - cron: "10 15 * * *"   # 毎日 0:10 JST（= UTC 15:10）
  workflow_dispatch:        # 手動実行ボタンあり

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # works.json をコミットするために必要

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリ
        run: pip install requests

      - name: 発売チェック実行
        run: python check_releases.py

      - name: 変更があればコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add works.json
          git diff --staged --quiet && echo "変更なし" || (
            git commit -m "chore: 発売ステータス自動更新 $(date -u '+%Y-%m-%d')"
            git push
          )
